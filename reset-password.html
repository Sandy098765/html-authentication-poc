<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - LearnSphere</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="styles.css">
</head>
<body class="d-flex align-items-center py-5">
<div class="container">
    <div class="row justify-content-center">
        <div class="col-12 col-sm-10 col-md-8 col-lg-5 col-xl-4">
            <div class="card auth-card p-4">
                <div class="text-center mb-4">
                    <div class="icon-box bg-primary-light mx-auto mb-3">
                        <i class="bi bi-shield-lock"></i>
                    </div>
                    <h2 class="fw-bold mb-2">Set New Password</h2>
                    <p class="text-muted">Your new password must be different from previous used passwords.</p>
                </div>
                
                <form action="index.html" method="GET">
                    <div class="mb-3">
                        <label for="newPassword" class="form-label">New Password</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-lock"></i></span>
                            <input type="password" class="form-control border-start-0 border-end-0" id="newPassword" placeholder="Must be at least 8 characters" required>
                            <span class="input-group-text bg-white" onclick="togglePassword('newPassword', 'toggleNewIcon')" style="cursor: pointer;">
                                <i class="bi bi-eye-slash text-muted" id="toggleNewIcon"></i>
                            </span>
                        </div>
                    </div>
                    
                    <div class="mb-4">
                        <label for="confirmPassword" class="form-label">Confirm Password</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                            <input type="password" class="form-control border-start-0 border-end-0" id="confirmPassword" placeholder="Both passwords must match" required>
                            <span class="input-group-text bg-white" onclick="togglePassword('confirmPassword', 'toggleConfirmIcon')" style="cursor: pointer;">
                                <i class="bi bi-eye-slash text-muted" id="toggleConfirmIcon"></i>
                            </span>
                        </div>
                    </div>
                    
                    <button type="submit" class="btn btn-primary w-100 mb-4">
                        <i class="bi bi-check-circle me-2"></i>Reset Password
                    </button>
                    
                    <div class="text-center">
                        <a href="index.html" class="auth-link text-muted">
                            <i class="bi bi-arrow-left me-1"></i>Back to log in
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    function togglePassword(inputId, iconId) {
        const passwordInput = document.getElementById(inputId);
        const toggleIcon = document.getElementById(iconId);
        
        if (passwordInput.type === 'password') {
            passwordInput.type = 'text';
            toggleIcon.classList.remove('bi-eye-slash');
            toggleIcon.classList.add('bi-eye');
        } else {
            passwordInput.type = 'password';
            toggleIcon.classList.remove('bi-eye');
            toggleIcon.classList.add('bi-eye-slash');
        }
    }
</script>

<!-- Bootstrap JS Bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
